<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>恢复数据 - WorkBuddy</title>
<style>
  body { font-family: "Microsoft YaHei", sans-serif; background: #f0f2f5; display: flex;
         justify-content: center; align-items: center; height: 100vh; margin: 0; }
  .box { background: #fff; padding: 40px; border-radius: 12px; text-align: center;
         box-shadow: 0 2px 12px rgba(0,0,0,0.1); max-width: 500px; }
  .spinner { border: 3px solid #e0e0e0; border-top: 3px solid #1a73e8; border-radius: 50%;
             width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .ok { color: #34a853; font-size: 48px; }
  .err { color: #ea4335; font-size: 48px; }
  button { background: #1a73e8; color: #fff; border: none; padding: 10px 24px;
           border-radius: 6px; font-size: 14px; cursor: pointer; margin: 8px; }
</style>
</head>
<body>
<div class="box" id="app">
  <h2>🔄 数据恢复中...</h2>
  <div class="spinner"></div>
  <p id="msg">正在从 Gist 获取完整数据...</p>
</div>
<script>
(function() {
  var msg = document.getElementById('msg');
  var app = document.getElementById('app');
  var rawUrl = 'https://gist.githubusercontent.com/JPN-123/8cd0ec9b1c7ba76a3186a4db9f6d8e80/raw/inventory_data.json';

  fetch(rawUrl)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      msg.textContent = '数据下载成功，正在写入 localStorage...';
      return r.json();
    })
    .then(function(data) {
      localStorage.setItem('inventory_data', JSON.stringify(data));
      localStorage.setItem('inventory_last_save', Date.now().toString());
      var items = (data.items || []).length;
      var history = (data.history || []).length;
      app.innerHTML = '<div class="ok">✅</div>'
        + '<h2>恢复成功！</h2>'
        + '<p>物品: ' + items + ' 条<br>历史: ' + history + ' 条</p>'
        + '<button onclick="location.href=\'index.html\'">进入系统</button>';
    })
    .catch(function(e) {
      app.innerHTML = '<div class="err">❌</div>'
        + '<h2>恢复失败</h2>'
        + '<p style="color:#ea4335;">' + e.message + '</p>'
        + '<button onclick="location.reload()">重试</button>'
        + '<button onclick="location.href=\'index.html\'">返回首页</button>';
    });
})();
</script>
</body>
</html>
