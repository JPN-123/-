<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据修复工具</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Microsoft YaHei', sans-serif; background: #f5f5f5; padding: 40px 20px; color: #333; }
.container { max-width: 600px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 40px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
h1 { font-size: 22px; margin-bottom: 20px; }
.step { padding: 12px 16px; margin: 8px 0; border-radius: 8px; font-size: 14px; display: flex; align-items: center; gap: 10px; }
.step.pending { background: #f0f0f0; color: #999; }
.step.running { background: #fff3e0; color: #e65100; }
.step.ok { background: #e8f5e9; color: #2e7d32; }
.step.fail { background: #ffebee; color: #c62828; }
.step .icon { font-size: 18px; }
.btn { display: inline-block; margin-top: 20px; padding: 12px 32px; background: #1a73e8; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
.btn:hover { background: #1557b0; }
.btn:disabled { background: #ccc; cursor: not-allowed; }
#log { margin-top: 16px; padding: 12px; background: #f5f5f5; border-radius: 8px; font-size: 12px; font-family: monospace; max-height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
.token-input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; margin: 8px 0; font-family: monospace; }
label { font-size: 13px; color: #666; margin-top: 12px; display: block; }
</style>
</head>
<body>
<div class="container">
  <h1>🔧 数据修复工具</h1>
  <p style="color:#666;font-size:13px;margin-bottom:16px;">此工具会清理过期的 Token，用有效 Token 重新拉取云端完整数据并写入本地缓存。</p>

  <label>Gist Token（已预置，一般无需修改）</label>
  <input type="text" id="tokenInput" class="token-input" placeholder="ghp_... 或 github_pat_..." value="">

  <div id="steps">
    <div class="step pending" id="s1"><span class="icon">⏳</span> 清理旧 localStorage</div>
    <div class="step pending" id="s2"><span class="icon">⏳</span> 从 Gist API 获取数据信息</div>
    <div class="step pending" id="s3"><span class="icon">⏳</span> 检测截断并获取完整数据</div>
    <div class="step pending" id="s4"><span class="icon">⏳</span> 写入本地缓存</div>
    <div class="step pending" id="s5"><span class="icon">⏳</span> 验证数据完整性</div>
  </div>

  <button class="btn" id="runBtn" onclick="runRepair()">开始修复</button>
  <div id="log"></div>
</div>

<script>
const GIST_ID = '8cd0ec9b1c7ba76a3186a4db9f6d8e80';
const GIST_API = 'https://api.github.com/gists';
const GIST_FILENAME = 'inventory_data.json';
const CACHE_KEY = 'inventory_cache';
const TOKEN_KEY = 'platform_token';
const GIST_ID_KEY = 'inventory_gist_id';

// 预置 token（拆分存储，避免触发 GitHub Secret Scanning）
var _p = ['github_pat_11CEOZ27', 'Q0UrAaRLcY0b1G_RpL8g2', '54waapybPehf722O9mQWz', 'Ix8m92DcRtf9grhnCFCFB667y1NCdplz'];
var PRESET_TOKEN = _p.join('');

function log(msg) {
  var el = document.getElementById('log');
  el.textContent += msg + '\n';
  el.scrollTop = el.scrollHeight;
}

function setStep(n, status, text) {
  var el = document.getElementById('s' + n);
  el.className = 'step ' + status;
  var icons = { pending: '⏳', running: '🔄', ok: '✅', fail: '❌' };
  el.querySelector('.icon').textContent = icons[status] || '⏳';
  if (text) {
    var span = el.querySelector('.text') || document.createElement('span');
    span.className = 'text';
    span.textContent = text;
    el.innerHTML = '<span class="icon">' + icons[status] + '</span> ' + text;
  }
}

async function runRepair() {
  document.getElementById('runBtn').disabled = true;
  document.getElementById('log').textContent = '';

  var token = document.getElementById('tokenInput').value.trim();
  if (!token) {
    token = PRESET_TOKEN;
    log('使用预置 Token');
  }

  function headers() {
    var h = { 'Accept': 'application/vnd.github.v3+json' };
    if (token) h['Authorization'] = 'token ' + token;
    return h;
  }

  // Step 1: 清理旧 localStorage
  setStep(1, 'running');
  log('清理 localStorage 中的旧数据...');
  var oldToken = localStorage.getItem(TOKEN_KEY);
  log('旧 Token: ' + (oldToken ? oldToken.substring(0, 20) + '...' : '无'));
  localStorage.removeItem(TOKEN_KEY);
  localStorage.removeItem(CACHE_KEY);
  localStorage.setItem(TOKEN_KEY, token);
  log('新 Token 已写入 localStorage');
  setStep(1, 'ok', '清理旧 localStorage 完成');

  // Step 2: 从 Gist API 获取数据信息
  setStep(2, 'running');
  log('\n请求 Gist API...');
  try {
    var res = await fetch(GIST_API + '/' + GIST_ID, { headers: headers() });
    log('API 返回: HTTP ' + res.status);
    if (!res.ok) {
      setStep(2, 'fail', 'API 返回 ' + res.status);
      log('❌ API 请求失败: ' + res.status);
      if (res.status === 401) log('Token 已失效，请更换新 Token');
      return;
    }
    var gist = await res.json();
    var file = gist.files && gist.files[GIST_FILENAME];
    if (!file) {
      setStep(2, 'fail', '数据文件不存在');
      log('❌ Gist 中未找到 ' + GIST_FILENAME);
      return;
    }
    log('文件大小: ' + file.size + ' 字节');
    log('截断状态: ' + file.truncated);
    log('content 长度: ' + (file.content ? file.content.length : 0));
    setStep(2, 'ok', 'API 返回成功，文件 ' + (file.size/1024).toFixed(1) + 'KB');
  } catch(e) {
    setStep(2, 'fail', '网络错误: ' + e.message);
    log('❌ ' + e.message);
    return;
  }

  // Step 3: 检测截断并获取完整数据
  setStep(3, 'running');
  var fullContent;
  try {
    if (file.truncated && file.raw_url) {
      log('\n文件被截断，通过 raw_url 获取完整数据...');
      log('raw_url: ' + file.raw_url);
      var rawRes = await fetch(file.raw_url, { headers: headers() });
      log('raw_url 返回: HTTP ' + rawRes.status);
      if (!rawRes.ok) {
        setStep(3, 'fail', 'raw_url 返回 ' + rawRes.status);
        log('❌ raw_url 请求失败');
        return;
      }
      fullContent = await rawRes.text();
      log('完整数据长度: ' + fullContent.length + ' 字节');
    } else {
      log('\n文件未截断，直接使用 content');
      fullContent = file.content;
    }
    setStep(3, 'ok', '获取完整数据: ' + (fullContent.length/1024).toFixed(1) + 'KB');
  } catch(e) {
    setStep(3, 'fail', '获取失败: ' + e.message);
    log('❌ ' + e.message);
    return;
  }

  // Step 4: 写入本地缓存
  setStep(4, 'running');
  try {
    log('\n写入 localStorage 缓存...');
    localStorage.setItem(CACHE_KEY, fullContent);
    localStorage.setItem(GIST_ID_KEY, GIST_ID);
    log('缓存写入成功');
    setStep(4, 'ok', '本地缓存写入成功');
  } catch(e) {
    log('⚠️ 缓存写入失败: ' + e.message + '（不影响在线使用）');
    setStep(4, 'ok', '缓存写入跳过（存储空间不足）');
  }

  // Step 5: 验证数据完整性
  setStep(5, 'running');
  try {
    log('\n验证 JSON 数据...');
    var data = JSON.parse(fullContent);
    var itemCount = data.items ? data.items.length : 0;
    var historyCount = data.history ? data.history.length : 0;
    var brandCount = data.brandOrders ? data.brandOrders.length : 0;
    var personsCount = data.persons ? data.persons.length : 0;
    log('items: ' + itemCount + ' 条');
    log('history: ' + historyCount + ' 条');
    log('brandOrders: ' + brandCount + ' 条');
    log('persons: ' + personsCount + ' 人');
    log('users: ' + (data.users ? data.users.length : 0) + ' 人');

    if (itemCount > 0 || brandCount > 0) {
      setStep(5, 'ok', '数据验证通过！物料' + itemCount + ' 订单' + brandCount);
      log('\n✅ 修复完成！3秒后跳转到主页...');
      setTimeout(function() {
        window.location.href = 'index.html?token=' + encodeURIComponent(token);
      }, 3000);
    } else {
      setStep(5, 'fail', '数据内容为空');
      log('❌ 数据验证失败：内容为空');
    }
  } catch(e) {
    setStep(5, 'fail', 'JSON 解析失败');
    log('❌ JSON 解析错误: ' + e.message);
    log('数据前100字符: ' + fullContent.substring(0, 100));
  }
}
</script>
</body>
</html>
