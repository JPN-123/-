<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生产管理系统</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }

  /* 顶部栏 */
  .top-bar {
    background: linear-gradient(135deg, #1a73e8, #0d47a1);
    color: #fff; padding: 16px 24px;
    display: flex; justify-content: space-between; align-items: center;
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 56px;
  }
  .top-bar h1 { font-size: 18px; font-weight: 600; letter-spacing: 1px; }
  .top-bar .subtitle { font-size: 12px; opacity: 0.8; margin-top: 2px; }

  /* 左侧导航 */
  .sidebar {
    position: fixed; top: 56px; left: 0; bottom: 0;
    width: 220px; background: #fff;
    border-right: 1px solid #e8e8e8;
    padding: 16px 0;
    overflow-y: auto;
  }
  .sidebar-title {
    font-size: 12px; color: #999; font-weight: 600;
    padding: 0 20px 12px; text-transform: uppercase; letter-spacing: 1px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 20px; margin: 2px 8px;
    border-radius: 8px;
    cursor: pointer; transition: all 0.2s;
    text-decoration: none; color: #555;
    font-size: 14px;
  }
  .nav-item:hover { background: #f0f7ff; color: #1a73e8; }
  .nav-item.active { background: #e8f0fe; color: #1a73e8; font-weight: 600; }
  .nav-item .icon { font-size: 18px; width: 24px; text-align: center; }
  .nav-item.inactive { opacity: 0.4; cursor: default; }
  .nav-item.inactive:hover { background: transparent; color: #555; }

  /* 右侧内容区 */
  .main-content {
    margin-left: 220px; margin-top: 56px;
    height: calc(100vh - 56px);
    position: relative;
  }
  .main-content iframe {
    width: 100%; height: 100%; border: none;
  }

  /* 欢迎页（默认不显示） */
  .welcome-page {
    padding: 32px; display: none;
  }
  .welcome-page .welcome-title { font-size: 24px; font-weight: 600; color: #333; margin-bottom: 8px; }
  .welcome-page .welcome-desc { font-size: 14px; color: #888; margin-bottom: 32px; }
</style>
</head>
<body>

<!-- 顶部栏 -->
<div class="top-bar">
  <div>
    <h1>生产管理系统</h1>
    <div class="subtitle">模块化统一管理平台</div>
  </div>
</div>

<!-- 左侧导航 -->
<div class="sidebar">
  <div class="sidebar-title">功能模块</div>
  <a class="nav-item active" data-module="inventory" onclick="switchModule('inventory')">
    <span class="icon">📦</span>
    <span>辅料库存管理</span>
  </a>
  <a class="nav-item inactive">
    <span class="icon">🔧</span>
    <span>配件库存管理</span>
  </a>
</div>

<!-- 右侧内容区 -->
<div class="main-content">
  <iframe id="moduleFrame" src="inventory.html"></iframe>
</div>

<script>
  // 模块地址映射
  const modules = {
    inventory: 'inventory.html'
  };

  // 自动透传 token
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token') || '';

  function getModuleUrl(name) {
    let url = modules[name];
    if (token) {
      url += (url.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(token);
    }
    return url;
  }

  function switchModule(name) {
    if (!modules[name]) return;
    // 更新导航高亮
    document.querySelectorAll('.nav-item').forEach(function(item) {
      item.classList.remove('active');
    });
    document.querySelector('[data-module="' + name + '"]').classList.add('active');
    // 切换 iframe
    document.getElementById('moduleFrame').src = getModuleUrl(name);
  }

  // 初始加载时透传 token 到 iframe
  if (token) {
    document.getElementById('moduleFrame').src = getModuleUrl('inventory');
  }
</script>

</body>
</html>
