<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生产管理系统</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }

  .header {
    background: linear-gradient(135deg, #1a73e8, #0d47a1);
    color: #fff; padding: 24px 32px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .header h1 { font-size: 24px; font-weight: 600; letter-spacing: 1px; }
  .header .subtitle { font-size: 13px; opacity: 0.8; margin-top: 4px; }

  .container { max-width: 960px; margin: 40px auto; padding: 0 24px; }

  .section-title { font-size: 16px; font-weight: 600; color: #555; margin-bottom: 20px; padding-left: 12px; border-left: 4px solid #1a73e8; }

  .modules { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

  .module-card {
    background: #fff; border-radius: 12px; padding: 28px 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    cursor: pointer; transition: all 0.25s ease;
    border: 2px solid transparent;
    text-decoration: none; color: inherit; display: block;
  }
  .module-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(26,115,232,0.15);
    border-color: #1a73e8;
  }
  .module-card .icon { font-size: 36px; margin-bottom: 16px; }
  .module-card .name { font-size: 18px; font-weight: 600; color: #1a73e8; margin-bottom: 8px; }
  .module-card .desc { font-size: 13px; color: #888; line-height: 1.5; }
  .module-card .arrow { position: absolute; right: 24px; top: 50%; transform: translateY(-50%); font-size: 20px; color: #ccc; }
  .module-card .inner { position: relative; padding-right: 30px; }

  .module-card.inactive {
    opacity: 0.5; cursor: default;
    background: #fafafa; border: 2px dashed #ddd;
  }
  .module-card.inactive:hover {
    transform: none; box-shadow: none; border-color: #ddd;
  }
  .module-card.inactive .name { color: #999; }

  .footer { text-align: center; padding: 32px 24px; color: #bbb; font-size: 12px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>生产管理系统</h1>
    <div class="subtitle">模块化统一管理平台</div>
  </div>
</div>

<div class="container">
  <div class="section-title">功能模块</div>
  <div class="modules">
    <a class="module-card" id="linkInventory">
      <div class="inner">
        <div class="icon">📦</div>
        <div class="name">辅料库存管理</div>
        <div class="desc">辅料信息管理、领入/领出登记、库存预警、流水记录</div>
      </div>
    </a>
    <a class="module-card inactive">
      <div class="inner">
        <div class="icon">🔧</div>
        <div class="name">配件库存管理</div>
        <div class="desc">即将上线</div>
      </div>
    </a>
  </div>
</div>

<div class="footer">Powered by WorkBuddy &middot; GitHub Pages</div>

<script>
  // 自动透传 token 参数给子模块
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token') || '';
  if (token) {
    document.getElementById('linkInventory').href = 'inventory.html?token=' + encodeURIComponent(token);
  } else {
    document.getElementById('linkInventory').href = 'inventory.html';
  }
</script>

</body>
</html>
