<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>API 诊断</title>
<style>
body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #4ec9b0; }
.box { background: #2d2d30; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #3e3e42; }
.ok { color: #4ec9b0; } .err { color: #f44747; } .warn { color: #dcdcaa; }
h2 { color: #569cd6; } .label { color: #9cdcfe; }
</style>
</head>
<body>
<h2>Gist API 诊断工具</h2>
<div id="output"></div>
<script>
var TOKEN = ['github_pat_11CEOZ27','Q0UrAaRLcY0b1G_RpL8g2','54waapybPehf722O9mQWz','Ix8m92DcRtf9grhnCFCFB667y1NCdplz'].join('');
var INDEX_GIST = 'add372557241d4f9038c3130b0b0f1ea';
var out = document.getElementById('output');
function log(msg, cls) {
  var div = document.createElement('div');
  div.className = 'box ' + (cls || '');
  div.innerHTML = msg;
  out.appendChild(div);
}
function headers(extra) {
  var h = extra || {};
  h['Accept'] = 'application/vnd.github.v3+json';
  h['Authorization'] = 'token ' + TOKEN;
  return h;
}

log('开始诊断...', 'warn');

// Step 1: Fetch index Gist
fetch('https://api.github.com/gists/' + INDEX_GIST, { headers: headers() })
  .then(function(r) {
    log('<span class="label">Step 1 - 索引Gist HTTP状态:</span> ' + r.status + ' ' + r.statusText, r.ok ? 'ok' : 'err');
    return r.json();
  })
  .then(function(gist) {
    var file = gist.files && gist.files['brand_orders.json'];
    if (!file) { log('索引Gist中没有brand_orders.json文件', 'err'); return; }
    var data = JSON.parse(file.content);
    log('<span class="label">Step 2 - 索引解析:</span> monthGists数量=' + data.monthGists.length, 'ok');
    data.monthGists.forEach(function(mg) {
      log('<span class="label">  月份:</span> ' + mg.month + ' <span class="label">GistId:</span> ' + mg.gistId);
    });

    // Step 3: Fetch each month Gist
    var promises = data.monthGists.map(function(mg) {
      return fetch('https://api.github.com/gists/' + mg.gistId, { headers: headers() })
        .then(function(r) {
          if (!r.ok) { log('<span class="label">月份 ' + mg.month + ':</span> HTTP ' + r.status, 'err'); return null; }
          return r.text();
        })
        .then(function(txt) {
          if (!txt) return;
          var parsed = JSON.parse(txt);
          var d;
          if (parsed.files && Object.keys(parsed.files).length > 0) {
            var fk = Object.keys(parsed.files);
            d = JSON.parse(parsed.files[fk[0]].content);
          } else {
            d = parsed;
          }
          var count = Array.isArray(d.brandOrders) ? d.brandOrders.length : 0;
          log('<span class="label">月份 ' + mg.month + ':</span> ' + count + ' 条订单 (响应大小: ' + txt.length + ' chars)', count > 0 ? 'ok' : 'warn');
        })
        .catch(function(e) {
          log('<span class="label">月份 ' + mg.month + ':</span> 错误 - ' + e.message, 'err');
        });
    });

    Promise.all(promises).then(function() {
      log('诊断完成！', 'ok');
    });
  })
  .catch(function(e) {
    log('索引Gist获取失败: ' + e.message, 'err');
  });
</script>
</body>
</html>
